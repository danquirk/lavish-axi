<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@pierre/diffs no-build smoke test</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0d1117;
        color: #f0f6fc;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        display: grid;
        gap: 24px;
        max-width: 1180px;
        margin: 0 auto;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(28px, 4vw, 44px);
        letter-spacing: -0.04em;
      }

      p {
        color: #8b949e;
      }

      section {
        display: grid;
        gap: 12px;
        min-width: 0;
      }

      .surface {
        overflow: hidden;
        border: 1px solid #30363d;
        border-radius: 14px;
        background: #010409;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>@pierre/diffs no-build smoke test</h1>
        <p>
          End-user browser evidence for the Lavish code playbook snippet: syntax-highlighted file plus split diff from
          CDN ESM.
        </p>
      </header>

      <section aria-labelledby="file-heading">
        <h2 id="file-heading">Syntax-highlighted file</h2>
        <div id="file" class="surface"></div>
      </section>

      <section aria-labelledby="diff-heading">
        <h2 id="diff-heading">Split diff</h2>
        <div id="diff" class="surface"></div>
      </section>
    </main>

    <script type="module">
      import { File, FileDiff } from "https://esm.sh/@pierre/diffs@1.2.10?bundle";

      const theme = { light: "github-light", dark: "github-dark" };
      const options = { theme, themeType: "dark", overflow: "wrap" };
      const oldFile = {
        name: "src/greeting.ts",
        contents:
          'export function greet(name: string) {\n  return "Hello " + name;\n}\n\nconsole.log(greet("Lavish"));\n',
      };
      const newFile = {
        name: "src/greeting.ts",
        contents:
          'export function greet(name: string) {\n  return "Hello, " + name + "!";\n}\n\nconsole.log(greet("Lavish"));\n',
      };

      new File(options).render({
        containerWrapper: document.querySelector("#file"),
        file: newFile,
      });

      new FileDiff({ ...options, diffStyle: "split" }).render({
        containerWrapper: document.querySelector("#diff"),
        oldFile,
        newFile,
      });
    </script>
  </body>
</html>
